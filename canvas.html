<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS | RESONANCE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.12.16/framer-motion.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&family=Noto+Serif+JP:wght@200;500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c084fc; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', 'Noto Serif JP', sans-serif; overflow-x: hidden; }
        
        /* The Fluid Mirror: Aurora Background */
        .aurora {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0a2a 0%, #050505 70%);
            overflow: hidden;
        }
        .blob {
            position: absolute; width: 600px; height: 600px; background: linear-gradient(135deg, rgba(192,132,252,0.07) 0%, rgba(34,211,238,0.07) 100%);
            filter: blur(80px); border-radius: 50%; animation: move 20s infinite alternate;
        }

        @keyframes move {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(20%, 20%) rotate(360deg); }
        }

        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-underline { background: transparent; border-bottom: 1px solid rgba(255,255,255,0.1); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .input-underline:focus { border-bottom: 1px solid #fff; outline: none; }
        
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 1s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Progress Bar */
        .progress-container { width: 100%; height: 2px; background: rgba(255,255,255,0.05); position: fixed; top: 0; left: 0; z-index: 100; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #c084fc, #22d3ee); transition: width 0.5s; }

        .suggestion-chip { cursor: pointer; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
        .suggestion-chip:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

        /* AI Whisper */
        #ai-whisper { font-family: 'Noto Serif JP', serif; font-style: italic; min-height: 1.5em; }
    </style>
</head>
<body class="min-h-screen pt-20 pb-10 px-6">
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div class="aurora"><div class="blob"></div><div class="blob" style="animation-delay: -10s; right: 0;"></div></div>

    <main class="max-w-4xl mx-auto">
        <header class="mb-16 text-center">
            <a href="index.html" class="text-[10px] tracking-[0.8em] text-gray-500 hover:text-white transition-all uppercase mb-12 block">← Return to Nexus</a>
            <h1 class="text-4xl md:text-6xl font-extralight tracking-tighter mb-6 uppercase">AI Interactive Canvas</h1>
            <p class="text-gray-400 font-light text-sm tracking-[0.2em] leading-relaxed">
                完璧な指示は不要です。あなたの脳内にあるキーワードを並べるだけで、私たちが形にします。
            </p>
        </header>

        <div class="flex justify-center mb-12">
            <button onclick="toggleMode('structured')" id="btn-structured" class="px-6 py-2 text-[10px] tracking-widest border-b-2 border-white">STEP BY STEP</button>
            <button onclick="toggleMode('flexible')" id="btn-flexible" class="px-6 py-2 text-[10px] tracking-widest border-b-2 border-transparent text-gray-600">FLEXIBLE MESSAGE</button>
        </div>

        <form id="canvas-form" action="https://formspree.io/f/mjgezdaq" method="POST" class="glass p-8 md:p-20 rounded-[3rem] relative">
            
            <div id="ai-response" class="mb-12 text-center opacity-0 transition-all duration-1000">
                <span id="ai-whisper" class="text-cyan-400 text-xs tracking-widest font-light"></span>
            </div>

            <div id="mode-structured" class="space-y-24">
                
                <section class="step-content active" id="step-1">
                    <h3 class="text-[10px] text-purple-400 tracking-[0.5em] uppercase mb-12">Section 01: Core Identity</h3>
                    <div class="space-y-16">
                        <div class="group">
                            <label class="block text-[10px] text-gray-600 tracking-widest mb-4">お名前 / 貴社名</label>
                            <input type="text" name="name" required class="w-full input-underline p-4 text-xl font-light">
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-600 tracking-widest mb-4">ビジネスを一言で言うと？</label>
                            <input type="text" id="biz-input" name="business_type" placeholder="例：30代女性向けの隠れ家エステ" class="w-full input-underline p-4 text-xl font-light">
                            <div class="flex flex-wrap gap-2 mt-4">
                                <span class="suggestion-chip px-3 py-1 rounded-full text-[10px]" onclick="fillInput('biz-input', '次世代AI SaaSサービス')">AI SaaS</span>
                                <span class="suggestion-chip px-3 py-1 rounded-full text-[10px]" onclick="fillInput('biz-input', '都心の隠れ家バー')">Luxury Bar</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-600 tracking-widest mb-4">解決したい最大の悩みは？</label>
                            <input type="text" name="pain_point" placeholder="例：集客、ブランドイメージの刷新" class="w-full input-underline p-4 text-xl font-light">
                        </div>
                    </div>
                    <button type="button" onclick="nextStep(2)" class="mt-16 text-[10px] tracking-[0.5em] text-gray-400 hover:text-white transition-all">Next: The Vision →</button>
                </section>

                <section class="step-content" id="step-2">
                    <h3 class="text-[10px] text-cyan-400 tracking-[0.5em] uppercase mb-12">Section 02: The Vision</h3>
                    <div class="space-y-16">
                        <div>
                            <label class="block text-[10px] text-gray-600 tracking-widest mb-4">「こうなりたい」イメージキーワード</label>
                            <input type="text" id="vision-input" name="keywords" placeholder="例：信頼、透明感、遊び心" class="w-full input-underline p-4 text-xl font-light" oninput="hearKeywords(this.value)">
                            <div class="flex flex-wrap gap-2 mt-4">
                                <span class="suggestion-chip px-3 py-1 rounded-full text-[10px]" onclick="fillInput('vision-input', '圧倒的な高級感と静寂')">高級感</span>
                                <span class="suggestion-chip px-3 py-1 rounded-full text-[10px]" onclick="fillInput('vision-input', '親しみやすさと遊び心')">遊び心</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-600 tracking-widest mb-4">AIへのメッセージ / その他こだわり</label>
                            <textarea name="vision_note" class="w-full input-underline p-4 text-xl font-light h-32 resize-none" placeholder="「あとはいい感じにお願い」も大歓迎です。"></textarea>
                        </div>
                    </div>
                    <div class="flex justify-between mt-16">
                        <button type="button" onclick="nextStep(1)" class="text-[10px] tracking-[0.5em] text-gray-700 uppercase">← Back</button>
                        <button type="button" onclick="nextStep(3)" class="text-[10px] tracking-[0.5em] text-gray-400 hover:text-white uppercase">Last Step →</button>
                    </div>
                </section>
            </div>

            <div id="mode-flexible" class="hidden">
                <section>
                    <h3 class="text-[10px] text-white tracking-[0.5em] uppercase mb-12">Flexible Request</h3>
                    <p class="text-[10px] text-gray-600 mb-8 tracking-widest uppercase">箇条書きやメモ書きでも結構です。こちらにすべての想いを放り込んでください。</p>
                    <textarea name="flexible_message" id="flex-input" class="w-full bg-transparent border border-gray-900 focus:border-white p-8 text-xl font-light leading-relaxed h-[400px] outline-none transition-all duration-1000" placeholder="メールを書くように、自由にお書きください。私が内容を整理し、具現化プランを策定します。"></textarea>
                </section>
            </div>

            <div class="mt-24 pt-12 border-t border-gray-900">
                <label class="block text-[10px] text-gray-600 tracking-widest mb-4 uppercase">Identity / Email Address</label>
                <input type="email" name="email" required placeholder="vision@resonance.ai" class="w-full input-underline p-4 text-xl font-light">
            </div>

            <button type="submit" id="birth-btn" class="w-full mt-20 py-10 bg-white text-black text-[10px] font-bold tracking-[1.5em] uppercase hover:bg-transparent hover:text-white border border-white transition-all duration-1000 overflow-hidden relative">
                <span id="btn-text" class="relative z-10">IGNITION : 具現化を開始する</span>
                <div id="particle-container"></div>
            </button>
        </form>
    </main>

    <script>
        // Mode Switch
        function toggleMode(mode) {
            const s = document.getElementById('mode-structured');
            const f = document.getElementById('mode-flexible');
            const bS = document.getElementById('btn-structured');
            const bF = document.getElementById('btn-flexible');

            if (mode === 'structured') {
                s.classList.remove('hidden'); f.classList.add('hidden');
                bS.classList.add('border-white'); bS.classList.remove('text-gray-600');
                bF.classList.remove('border-white'); bF.classList.add('text-gray-600');
                updateProgress(currentStep / 3 * 100);
            } else {
                s.classList.add('hidden'); f.classList.remove('hidden');
                bF.classList.add('border-white'); bF.classList.remove('text-gray-600');
                bS.classList.remove('border-white'); bS.classList.add('text-gray-600');
                updateProgress(80);
            }
        }

        // Stepper
        let currentStep = 1;
        function nextStep(step) {
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('step-' + step).classList.add('active');
            currentStep = step;
            updateProgress(currentStep / 2 * 100);
            
            if(step === 2) whisperAI("ビジョンを共有しましょう。あなたの『こだわり』が、デザインの魂になります。");
        }

        function updateProgress(val) { document.getElementById('progress-bar').style.width = val + '%'; }
        function fillInput(id, val) { document.getElementById(id).value = val; hearKeywords(val); }

        // AI Whisper & Reaction
        function whisperAI(msg) {
            const resp = document.getElementById('ai-response');
            const text = document.getElementById('ai-whisper');
            resp.style.opacity = 0;
            setTimeout(() => {
                text.innerText = msg;
                resp.style.opacity = 1;
            }, 500);
        }

        function hearKeywords(val) {
            if (val.includes('高級')) {
                document.querySelector('.aurora').style.background = "radial-gradient(circle at 50% 50%, #2a1a0a 0%, #050505 70%)";
                whisperAI("高級感、素敵ですね。信頼感と静謐さを纏ったデザインを構築します。");
            } else if (val.includes('遊び心')) {
                document.querySelector('.aurora').style.background = "radial-gradient(circle at 50% 50%, #0a2a1a 0%, #050505 70%)";
                whisperAI("遊び心ですね。ユーザーの心が弾むような、動的な体験を設計しましょう。");
            } else if (val.length > 5) {
                whisperAI("そのイメージ、確かに受信しました。共鳴が進んでいます。");
            }
        }

        // Birth Effect & Submit
        document.getElementById('canvas-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('birth-btn');
            const btnText = document.getElementById('btn-text');
            
            btnText.innerText = "CRYSTALLIZING...";
            btn.style.letterSpacing = "0.5em";
            
            // 擬似的な解析アニメーション
            await new Promise(r => setTimeout(r, 2000));
            
            const formData = new FormData(e.target);
            try {
                const response = await fetch(e.target.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    btnText.innerText = "BORN. あなたの空想は現実へ。";
                    btn.classList.add('bg-cyan-500');
                    alert("Ignition Sequence Started. 戦略の脳（AI）が解析を開始しました。24時間以内にプロトタイプを提示します。");
                    window.location.href = "index.html";
                }
            } catch (err) {
                btnText.innerText = "ERROR - RETRY";
            }
        });
    </script>
</body>
</html>
